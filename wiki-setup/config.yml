#######################################################################
# Wiki.js - Configuration File
#######################################################################

# ---------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------
port: 3000
bindIP: 0.0.0.0

# ---------------------------------------------------------------------
# Database
# Using SQLite - no setup needed, data stored in a local file
# ---------------------------------------------------------------------
db:
  type: mariadb
  host: localhost
  port: 3306
  user: bilomast_DB
  pass: $(DB_PASS)
  db: bilomast_wiki

# ---------------------------------------------------------------------
# SSL (handled by cPanel/Apache, leave off here)
# ---------------------------------------------------------------------
ssl:
  enabled: false

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logLevel: info

# ---------------------------------------------------------------------
# Offline Mode
# Set to true if your server has no internet access
# ---------------------------------------------------------------------
offline: false

# ---------------------------------------------------------------------
# High-Availability
# ---------------------------------------------------------------------
ha: false

# ---------------------------------------------------------------------
# Data Path
# ---------------------------------------------------------------------
dataPath: ./data
